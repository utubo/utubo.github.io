<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="initial-scale=1.0">
	<title>Add-ons</title>
	<link rel="stylesheet" href="default.css">
</head>
<body>
	<div class="button-h">
		<a class="title" href="./tilt_pagescrolling.xpi">
			<img src="default_addon_icon.png" class="icon">tilt_pagescrolling.xpi ver1.2
		</a>
		<span class="note">
			スマホをクイッって手前に傾けるとページ送りします。
			コレだけの機能しかないのですが、多分これだけの説明だとAMOの審査に通らないのでここに置いておきます。
		</span>
	</div>
	<div class="button-h">
		<a class="title" href="./tilt_scrolling.xpi">
			<img src="default_addon_icon.png" class="icon">tilt_scrolling.xpi ver1.10
		</a>
		<span class="note">
			スマホを傾けるとスクロールします。
			ページロード直後と指を離した時点が起点になります。<br>
			<a href="http://example.com/tilt_scrolling_options">設定ページ(Firefox56以下用)</a><br>
			っていうのを作ってみたんだけど、とても使いにくい…<br>
			ずっと画面に触らずスクロールさせてるとスリープ入っちゃうし
		</span>
	</div>
</body>
</html>
